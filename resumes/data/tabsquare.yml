          - Established engineering norms for GenAI use (prompt patterns, code review gating, security guardrails, eval frameworks) so AI-assisted output met production quality bars on a high-throughput transaction platform.
          - Led deep cloud infrastructure optimization achieving ~50% cost reduction through compute, storage, and network restructuring, improving platform economics for international growth.
          - Instituted the Weekly Operational Review (WOR), a cross-squad cadence covering SLO posture, error-budget burn, latency, capacity, and post-incident actions, which became the standing operational scorecard for the org and the template I later carried into YouTrip.
          - Owned hiring, retention, and development of senior engineering talent across three countries, sustaining a strong leadership layer of EMs and senior ICs accountable for platform delivery, while fostering psychological safety and ego-free technical debate.
      - title: "Director of Engineering, Platform & Verticals"
        period: "Jan 2021 - Dec 2022"
        details:
          - Scaled engineering organization to 150+ people; directly managed 70+ engineers across Merchants, Trust & Safety, and Properties verticals, the same shape of multi-vertical leadership the TabSquare CTO role demands.
          - Owned engineering for the paying-merchant portfolio and monetization platform across Southeast Asia, scaling revenue infrastructure that originated as a $0 function in 2017 into a multi-market B2B engagement and monetization engine, comparable to the TabSquare merchant-facing F&B stack.
          - Built and mentored the leadership layer (EMs and senior ICs) that allowed the org to scale beyond founder-led structures, with structured career ladders and growth plans.
          - Partnered with Product and Data Science to deliver monetization, recommendation, and engagement features improving ARPU and user retention across verticals.
          - Scaled infrastructure for high-traffic, multi-region workloads; operationalized experimentation frameworks and event-driven pipelines for ML model integration into production.
          - Reduced time-to-ship by ~20% through CI/CD pipeline improvements, observability investments, and engineering excellence practices across distributed Singapore and India teams.
      - title: Senior Engineering Manager

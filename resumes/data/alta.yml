# Alta - Chief Technology/Product Officer
# Digital securities exchange, tokenization, private markets, PMaaS platform
# Source: Ryan De Melo (direct, no recruiter)
# Overrides base.yml fields.

basics:
  headline: "CTO / CPO | API-First Platform at Scale | Regulated Fintech | Multi-Country Engineering Org"
  location: "Singapore"

theme:
  primary: "#0f3460"
  primary_light: "#dce8f5"
  sidebar_bg: "#f5f8fc"

summary: >-
  Engineering leader with 17+ years building and scaling API-first, event-driven
  platforms across APAC - fintech, marketplace, and digital-infrastructure
  contexts. Currently VP of Engineering at YouTrip, operating in a MAS-regulated
  environment on a proprietary multi-market platform processing $15B+ in annual
  transactions. Before that, 8 years at Carousell scaling engineering to 150+
  across Singapore, India, and Indonesia, owning product and platform strategy,
  and building the commercial monetization engine from a $0 function into a
  multi-market revenue layer.

  The Alta CTO/CPO mandate maps directly to how I operate. I own both product
  direction and engineering execution - translating commercial and regulatory
  priorities into platform roadmap, partnering closely with CEOs and commercial
  leaders on positioning and packaging, and leading heads of Product, Engineering,
  Data, and QA across distributed teams. I've built and managed multi-tenant,
  API-first platforms designed for white-label extensibility and multi-client
  scale - exactly the architecture pattern underlying PMaaS. I've driven
  platformization that reduces time-to-onboarding for new markets and partners,
  prioritized an AI-augmented development lifecycle alongside compliance controls in a regulated fintech
  environment, and managed the cross-functional alignment across Technology,
  Operations, Legal, and Compliance that capital markets infrastructure demands.

  Experienced in building and nurturing high-ownership, high-collaboration
  engineering cultures across Singapore, India, and Indonesia - the same
  multi-country footprint Alta operates. Ready to bring the same rigour to
  digital securities, private markets infrastructure, and the PMaaS opportunity.


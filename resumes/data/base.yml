summary: >-
  Engineering leader with 17+ years of experience building and scaling
  distributed platforms across APAC, with deep focus on real-time transaction
  systems, monetization, and engagement platforms.

  Spent 8 years at Carousell, Southeast Asia's largest classifieds marketplace,
  progressing from Senior Engineering Manager to Head of Engineering and
  scaling the org to 150+ engineers across Singapore, India, and Indonesia.
  Built the monetization platform from a $0 function into a multi-market
  revenue engine spanning ads, subscriptions, paid placements, recommendations,
  and seller-facing products, growing daily revenue 30x. Drove platformization
  of payments, subscriptions, and API layers into a reusable event-driven
  distributed backbone, and led the integration of Laku6 (acquired Indonesian
  recommerce platform) into the core stack. In the final year, drove org-wide
  GenAI adoption, sustaining and lifting development velocity through a
  deliberate team scale-down.

  Most recently VP of Engineering at YouTrip (Jan - Jun 2026), led a
  distributed fintech platform processing over $15B in annual transactions
  across Singapore, Thailand, Malaysia, and Australia, with 70+ engineers
  across four countries.

  Background spans high-throughput transaction processing, monetization and
  engagement platforms, event-driven and API-first architectures, multi-market
  integrations, and engineering operations at scale. Passionate about technical
  excellence, building high-performing globally-distributed teams, and
  modernizing engineering practices including GenAI-assisted development,
  observability, and AI-augmented development lifecycles.


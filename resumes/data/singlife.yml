summary: >-
  Engineering leader with 17+ years building and scaling distributed
  platforms across APAC, currently running engineering for a MAS-regulated
  fintech operating under the same regulatory posture (AML/KYC, audit,
  secure SDLC, vendor governance) that insurance carriers work within.
  Singapore Permanent Resident, based in Singapore.

  VP of Engineering at YouTrip, leading 70+ engineers across Singapore,
  India, Hong Kong, and Indonesia on a MAS-regulated platform processing
  over $15B in annual transactions across four markets. Stack is Java
  services on AWS with EKS, IaC (Terraform), React front-ends, and a
  React Native mobile app. Operating mode: set architectural vision,
  own low-level design and non-functional requirements (scalability,
  availability, security, performance, resilience), review MRs on
  high-risk components, mentor EMs and Tech Leads, and partner closely
  with Product, Security, Compliance, and external vendors on
  MAS-aligned delivery.

  Spent 8 years at Carousell, Southeast Asia's largest classifieds
  marketplace, progressing from Senior Engineering Manager to Head of
  Engineering and scaling the org to 150+ engineers across Singapore,
  India, and Indonesia. Drove platformization of payments, subscriptions,
  and API layers into a reusable event-driven, API-first distributed
  backbone. Led the integration of Laku6, the acquired Indonesian
  recommerce platform, into the core stack, a multi-quarter platform
  migration aligning architectures, payment rails, and data systems
  across markets. Managed mixed internal and vendor engineering capacity
  and set consistent quality bars across teams. In the final year, drove
  org-wide GenAI adoption that sustained development velocity through a
  deliberate scale-down.

  Hands-on where it counts: still reads code, drives design reviews, and
  owns the low-level design of high-risk components. Comfortable across
  the full lifecycle from problem framing and POCs through to scaled
  production services with proper logging, monitoring, and alerting.


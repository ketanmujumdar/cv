cover_letter: |
  Dear TabSquare Hiring Team,

  Four things in the TabSquare CTO charter line up almost exactly with the
  work I've been doing for the past decade: evolving a vertical product
  into an API-first platform, leading a ~100 engineer distributed APAC org,
  institutionalising AI-native engineering, and acting as the technical
  bridge between exec strategy and execution across 10+ markets. I'd like
  to be considered.

  At Carousell (8 years, Senior EM to Head of Engineering, org scaled to
  150+ across Singapore, India, Indonesia), I built the monetization and
  merchant platform from a $0 function into a multi-market revenue engine
  growing daily revenue 30x, and drove its architectural evolution into a
  reusable, event-driven, API-first distributed backbone for payments,
  subscriptions, recommendations, and partner integrations. That is the
  "product to platform" transition TabSquare is asking for. I also led the
  post-acquisition integration of Laku6, Carousell's Indonesian recommerce
  arm, into the core stack, aligning architectures, payment rails, and
  data systems while keeping the local operating model intact, the same
  shape of multi-market consolidation a 10+ market F&B-tech platform
  demands.

  AI-native engineering is the area I've invested in most deeply over the
  past two years. In my last year at Carousell, I drove org-wide adoption
  of AI-assisted development (Copilot, Cursor, Claude Code, internal
  LLM-assisted code review and test generation), and shipped AI-powered
  internal products for listing categorization, content moderation, fraud
  signal extraction, and seller tooling. The concrete outcome: we held
  development velocity steady, and improved it on several teams, through a
  deliberate team scale-down by offsetting reduced headcount with
  AI-leveraged productivity. I established the engineering norms (prompt
  patterns, code review gating, security guardrails, eval frameworks)
  needed for AI-assisted output to meet production quality on a
  high-throughput transaction platform. That is "institutionalising
  innovation through AI-native strategies" in practice, not slideware.

  The reliability and performance discipline TabSquare's charter calls
  for is a practice I've built up over years. I originally instituted a
  Weekly Operational Review (WOR) at Carousell, a recurring forum where
  every squad walks through SLO posture, error budget burn, latency
  regressions, incident post-mortem actions, and capacity headroom
  against agreed thresholds, and carried the same cadence into YouTrip.
  It consistently turns reliability from a fire-fighting reflex into a
  measurable, exec-visible scorecard. Most recently, as VP of Engineering
  at YouTrip (wrapping up this month), that cadence paired with targeted
  reliability engineering drove a 31%+ reduction in critical 5xx errors
  on a regulated fintech platform processing $15B+ in annual transactions
  across four markets, while I partnered directly with the CEO on
  multi-year platform direction. It is exactly the operational backbone
  a platform supporting 7000+ restaurants and 99.9% uptime needs, and the
  kind of rhythm I'd bring to TabSquare on day one.

  On the 0-to-1 side, I've launched verticals from scratch repeatedly,
  monetization at Carousell, and an early ad-tech and fintech startup of
  my own, so I'm comfortable carving out "Labs"-style standalone bets
  without losing the production discipline above. I lead in an ego-free
  style, invest deeply in career ladders and succession, and have a track
  record of building leadership layers that outlast founder-led
  structures, exactly what a ~100 engineer distributed org needs to scale
  further. I'm now actively looking for the next charter, and TabSquare's
  mandate is the one I want.

  On the technical side, my stack experience spans Python, Ruby on Rails,
  PHP, TypeScript, React, Vue, AWS, GCP, and Kubernetes in production, with
  working exposure to Java/Spring ecosystems through integration work.
  Comfortable going deep on distributed systems patterns (microservices,
  event-driven, API-first, fault-tolerant design) and on the data,
  reliability, and security trade-offs that come with running platforms
  that millions of customers and thousands of merchants depend on daily.

  Singapore-based, Singapore PR, and very interested in the dining/F&B
  tech space, which sits at an unusually rich intersection of marketplace,
  payments, AI, and physical-world UX. I'd welcome the chance to talk
  through how I'd approach the first 6-12 months of the role.

  Ketan Mujumdar

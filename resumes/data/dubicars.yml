summary: >-
  Technology executive with 17+ years of experience building and scaling
  platform-led engineering organizations across APAC. Currently VP of
  Engineering at YouTrip, leading a distributed organization of 70+ engineers
  across Singapore, India, Hong Kong, and Indonesia on a proprietary
  multi-market fintech platform supporting millions of users and high-volume
  transaction flows.

  Spent 8 years at Carousell, Southeast Asia's largest classifieds
  marketplace, progressing from Senior Engineering Manager to Head of
  Engineering, scaling the org to 150+ engineers across Singapore, India,
  and Indonesia. There I owned engineering for the dealer and paying-merchant
  monetization platform, the Properties and Cars verticals, and the listings,
  ads, and subscriptions stack, evolving market-specific implementations into
  reusable multi-market platforms. I also led the integration of Laku6
  (acquired Indonesian recommerce platform) into the core platform, a direct
  build/buy/partner consolidation parallel.

  My background spans classifieds marketplaces, dealer-facing SaaS, advertising,
  and payments, building high-reliability platforms, complex integrations,
  recommendation and data systems, and engineering operations at scale. I'm
  particularly passionate about building strong engineering cultures, developing
  leadership layers, improving accountability and execution, and helping
  fast-growing marketplaces transition from founder-driven teams into mature
  organizations capable of operating at regional and global scale.


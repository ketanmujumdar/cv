# GovTech - Director / Deputy Director, PDO Engineering Leader
# Overrides base.yml fields.

basics:
  headline: "Engineering Director | Multi-Squad Platform Leadership | POC-to-Scale, Secure by Design"
  location: "Singapore (Singapore PR)"

theme:
  primary: "#334155"
  primary_light: "#e2e8f0"
  sidebar_bg: "#f1f5f9"

summary: >-
  Engineering leader with 18+ years building and scaling distributed platforms
  across APAC, operating as a manager-of-managers across multiple squads,
  internal staff, and vendor teams. Singapore PR, based in Singapore.

  Spent 8 years at Carousell, Southeast Asia's largest classifieds marketplace,
  progressing from Senior Engineering Manager to Head of Engineering and
  scaling the org to 150+ engineers across Singapore, India, and Indonesia.
  Drove platformization of payments, subscriptions, recommendations, and API
  layers into a reusable event-driven, API-first distributed backbone,
  promoting reuse and avoiding unnecessary complexity across teams. Led the
  integration of Laku6, the acquired Indonesian recommerce platform, into the
  core stack, a multi-quarter platform migration aligning architectures,
  payment rails, and data systems across markets. In the final year, drove
  org-wide GenAI adoption that sustained development velocity through a
  deliberate team scale-down.

  Currently VP of Engineering at YouTrip, leading a regulated fintech
  platform processing over $15B in annual transactions across Singapore,
  Thailand, Malaysia, and Australia, with 70+ engineers across four
  countries. Operating mode: setting architectural vision, raising the bar
  on secure SDLC and SRE, coaching EMs and Tech Leads, and partnering
  closely with Product, Design, Security, and Compliance.

  Practical product-delivery mindset: comfortable across the full lifecycle
  from problem framing and POC/POV experiments through to scalable, reliable,
  user-centred services. Known for technical credibility (still reads code
  and reviews designs), outcome-orientation, and building lean, high-trust
  leadership structures that deliver measurable impact.


cover_letter: |
  Dear Joey,

  I'm writing regarding the Head of Technology role you're running for your
  BFSI client across Asia. The brief, hands-on architectural leadership,
  embedding AI into both engineering and the business, secure cloud
  infrastructure across APAC, and navigating regional regulatory frameworks,
  maps very closely to what I'm doing today and what I've built over the
  past decade.

  I'm currently VP of Engineering at YouTrip, a Singapore-headquartered
  regulated fintech processing over $15 billion in annual transactions
  across Singapore, Thailand, Malaysia, and Australia. I lead 70+ engineers
  across four countries through EMs and Tech Leads, and I operate as the
  architectural anchor: still in code and design reviews daily, owning
  system design, data architecture, secure SDLC, and the cloud platform
  across markets. I've driven a 31%+ reduction in critical 5xx transaction
  errors through targeted reliability engineering, and I partner directly
  with the CEO, Product, Risk, and Compliance on platform strategy.

  AI is the area I've invested in most deeply over the past two years, and
  where I think I can move the needle fastest for your client. At Carousell
  I drove org-wide GenAI adoption (Copilot, Cursor, Claude Code, internal
  LLM-assisted code review, test generation, design review, and on-call
  assistants), and shipped AI-powered internal products for listing
  categorization, content moderation, fraud signal extraction, and seller
  tooling. The concrete business outcome: we sustained, and on several teams
  lifted, development velocity through a deliberate team scale-down by
  offsetting reduced headcount with AI-leveraged productivity. Equally
  important, I established the engineering norms required for that to work
  in a regulated environment, prompt patterns, eval frameworks, code review
  gating, security guardrails, and data-handling policies, so AI-assisted
  output met production quality bars on a high-throughput transaction
  platform. At YouTrip I'm extending that playbook into a regulated fintech
  setting, including agentic workflows for ops automation and AI-assisted
  observability.

  On the infrastructure and security side, I've owned regional cloud
  estates (AWS, GCP, Kubernetes) across multiple APAC markets, led a deep
  optimization effort at Carousell that delivered ~50% infra cost reduction,
  and operated secure SDLC and DevSecOps practices in regulated fintech.
  I'm comfortable working across compliance landscapes spanning Singapore
  (MAS-adjacent for the fintech work), Indonesia, Thailand, Malaysia,
  Australia, and Hong Kong, and used to partnering with Risk, Legal, and
  Compliance on data governance, vendor risk, and audit readiness.

  Before YouTrip and Carousell I held release engineering and platform
  roles at MediaCorp and Zalora, and earlier ran my own engineering
  consultancy in India delivering fintech and ad-tech products. The full
  background spans 17+ years across APAC.

  I'd welcome a conversation about the role and the client. Happy to share
  more detail on the AI adoption playbook, the regulated fintech work, or
  the regional org structure, whichever is most useful for your shortlist.

  Best regards,
  Ketan Mujumdar

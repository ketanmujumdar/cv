# Bakuun - Head of Engineering
# Overrides base.yml fields. Source of truth is base.yml structure.

basics:
  headline: "Engineering Leader | Marketplace Platforms, Payments & Multi-Market Distribution at Scale"

theme:
  primary: "#0F4C75"
  primary_light: "#dbe7f0"
  sidebar_bg: "#f3f6f9"

summary: >-
  Engineering leader with 17+ years of experience building and scaling
  distributed platforms across APAC, with deep focus on marketplaces,
  payment infrastructure, and multi-market transactional systems.

  Spent 8 years at Carousell, Southeast Asia's largest classifieds
  marketplace, progressing from Senior Engineering Manager to Head of
  Engineering and scaling the org to 150+ engineers across Singapore,
  India, and Indonesia. Owned the marketplace platform end-to-end:
  listings, search and ranking, payments, seller tooling, paid
  placements, and merchant operations across multiple markets. Drove
  the platformization of payments, subscriptions, and API layers into
  a reusable event-driven, API-first distributed backbone, and led
  the integration of Laku6 (acquired Indonesian recommerce platform)
  into the core stack, aligning architectures, payment rails, and
  data systems across markets.

  Currently VP of Engineering at YouTrip, leading a proprietary
  multi-market fintech platform processing over $15B in annual
  transactions across Singapore, Thailand, Malaysia, and Australia,
  with 70+ engineers across four countries. Own platform strategy,
  reliability, and operating model in a regulated payments
  environment.

  Background spans marketplace and transactional platforms,
  high-throughput payment processing, multi-market distribution and
  integration work, event-driven and API-first architectures, and
  engineering operations through high-growth phases. I set the
  technical bar, build the leadership layer, and own the operating
  cadence that turns roadmap into predictable delivery against
  commercial commitments.


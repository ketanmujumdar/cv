  platform infrastructure. I've operated in regulated environments (MAS), led
  AI-augmented development lifecycles, and shipped data-intensive features across
  consumer and B2B contexts.

  Singapore-based, with a track record of building high-ownership engineering cultures
  that scale without sacrificing quality or pace.


cover_letter: |
  Dear Hiring Team,

  I'm writing to express my strong interest in the Engineering Director - Data
  & Agentic position at Sonar. With 17+ years of engineering leadership and a
  deep passion for code quality, AI-driven development, and data-powered
  decision-making, I believe I'm well-positioned to contribute to Sonar's
  mission of ensuring AI-generated software is reliable, secure, and
  maintainable.

  As VP of Engineering at YouTrip, I lead the complete engineering and people
  function for a fintech platform processing over $15 billion in annual
  transactions. I'm spearheading our AI transformation - driving adoption of
  agentic AI technologies to enhance engineering productivity, code quality,
  and product innovation. My work spans infrastructure optimization ($25K/month
  ROI uplift), platform reliability (31%+ error reduction), and data-driven
  operational dashboards.

  Previously at Carousell, I built and led organizations of 70+ engineers
  across Singapore, India, and Indonesia, managing through Engineering Managers
  and Tech Leads. I drove cloud platform modernization (achieving ~50% cost
  savings), operationalized ML/experimentation frameworks, and championed
  developer experience through CI/CD and automated testing.

  What excites me most about Sonar is the intersection of code quality and AI -
  ensuring that AI-assisted and agentic development produces reliable, secure
  software. This aligns perfectly with my current work driving AI adoption
  while maintaining platform integrity at scale.

  I'm based in Singapore and welcome the opportunity to discuss how my
  experience can contribute to Sonar's growth.

  Warm regards,
  Ketan Mujumdar

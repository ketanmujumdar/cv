career-profile:
    title: Career Profile
    summary: |
      Engineering leader with 17+ years building and scaling distributed platforms across APAC, with deep focus on real-time transaction systems, monetization, and engagement platforms. Currently VP of Engineering at YouTrip, leading a fintech platform processing $15B+ in annual transactions across Singapore, Thailand, Malaysia, and Australia with 70+ engineers across four countries. Previously spent 8 years at Carousell, scaling engineering to 150+ across Singapore, India, and Indonesia. Built Carousell's monetization platform from a $0 function into a multi-market revenue engine spanning ads, subscriptions, recommendations, and seller-facing products, growing daily revenue 30x. Drove platformization of payments, subscriptions, and APIs into a reusable event-driven distributed backbone, and led the integration of Laku6 (acquired Indonesian recommerce platform) into the core stack. In the final year, drove org-wide GenAI adoption, sustaining and lifting development velocity through a deliberate team scale-down. Passionate about technical excellence, building high-performing globally-distributed teams, and modernizing engineering practices through GenAI-assisted development, observability, and secure SDLC.

# TabSquare (Delivery Hero) - Chief Technology Officer
# Overrides base.yml fields.

basics:
  headline: "CTO / VP Engineering | API-First Platforms at APAC Scale | AI-Native Strategy | 0-to-1 to 150+ Org Builder"

theme:
  primary: "#0FB6A8"
  primary_light: "#d6f4f0"
  sidebar_bg: "#f3fbfa"

summary: >-
  Engineering leader with 17+ years building and scaling distributed,
  API-first platforms across APAC, with deep focus on high-throughput
  transaction systems, multi-market B2B/B2B2C product suites, and AI-native
  engineering. Operates as a leader-of-leaders, comfortable acting as the
  technical bridge between executive strategy and engineering execution.

  Spent 8 years at Carousell, Southeast Asia's largest classifieds
  marketplace, progressing from Senior Engineering Manager to Head of
  Engineering and scaling the org to 150+ engineers across Singapore, India,
  and Indonesia. Built the monetization and merchant platform from a $0
  function into a multi-market revenue engine spanning ads, subscriptions,
  paid placements, recommendations, and seller-facing engagement products,
  growing daily revenue 30x. Drove the architectural evolution toward a
  reusable, event-driven, API-first distributed backbone for payments,
  subscriptions, recommendations, and external partner integrations, and
  led the post-acquisition integration of Laku6 (Indonesian recommerce) into
  the core platform. In the final year, drove org-wide GenAI adoption that
  sustained and lifted development velocity through a deliberate team
  scale-down, an AI-native operating model in practice.

  Most recently VP of Engineering at YouTrip (Jan - Jun 2026), led a
  regulated fintech platform processing $15B+ in annual transactions
  across Singapore, Thailand, Malaysia, and Australia with 70+ engineers
  across four countries. Operating mode: setting platform strategy and
  architectural vision, raising the bar on reliability (drove a 31%+
  reduction in critical 5xx errors), institutionalising GenAI in the
  SDLC, and partnering with the CEO and exec team on multi-year platform
  direction. Now actively seeking the next CTO-level charter.

  Background spans 0-to-1 product launches, multi-market F&B/marketplace
  adjacent platforms, B2B/B2B2C ecosystems, and engineering operations at
  scale. Known for principled solution design, calm leadership of
  distributed and remote teams, and translating high-level OKRs into
  shippable architecture without losing UX obsession or the speed of a
  startup.


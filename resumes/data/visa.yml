summary: >-
  Engineering leader with 17+ years of experience building and scaling
  distributed platforms across APAC, with deep focus on real-time transaction
  systems, monetization, and engagement platforms.

  Spent 8 years at Carousell, Southeast Asia's largest classifieds marketplace,
  progressing from Senior Engineering Manager to Head of Engineering and
  scaling the org to 150+ engineers across Singapore, India, and Indonesia.
  There I built the monetization and engagement platform from a $0 function
  into a multi-market revenue engine spanning ads, subscriptions, paid
  placements, recommendations, and seller-facing engagement products,
  growing daily revenue 30x. I drove the platformization of payments,
  subscriptions, and API layers into a reusable distributed backbone, and
  led the integration of Laku6 (acquired Indonesian recommerce platform)
  into the core stack, aligning architectures, payments, and data systems
  across markets.

  Currently VP of Engineering at YouTrip, leading a distributed fintech
  platform processing over $15B in annual transactions across Singapore,
  Thailand, Malaysia, and Australia, with 70+ engineers across four
  countries.

  My background spans high-throughput transaction processing, monetization
  and loyalty-adjacent platforms, event-driven and API-first architectures,
  multi-market integrations, and engineering operations at scale. I'm
  passionate about technical excellence, building high-performing
  globally-distributed teams, and modernizing engineering practices including
  GenAI-assisted development, observability, and secure SDLC.


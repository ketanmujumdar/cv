      - Driving GenAI adoption across development, testing, and code review workflows to lift engineering productivity and code quality without compromising security guardrails.
      - Strengthening secure SDLC, observability, and operational governance across a regulated fintech environment with MAS-aligned controls.

  - company: Carousell
    location: Singapore
    period: "Nov 2017 - Dec 2025 (8 years)"
    subroles:
      - title: "Head of Engineering, Laku6 & Director of Engineering"
        period: "Jan 2023 - Dec 2025"
        note: "Laku6 is Carousell's Indonesia recommerce arm (acquired 2021)."
        details:
          - Led 50+ engineers and product managers across 3 platform teams in Singapore, India, and Indonesia, managing through EMs and Tech Leads, with quarterly OKRs driving 90%+ delivery success.
          - Established unified architectural vision and cross-squad technical standards covering security, scalability, and DevOps/SRE practices.
          - Drove platformization of payments, subscriptions, recommendations, and API layers into a reusable event-driven, API-first distributed backbone, reducing time-to-integration for new market launches and avoiding unnecessary per-team rebuilds.
          - Led the Laku6 integration into Carousell's core platform, a major platform migration aligning architectures, payment rails, and data systems across markets while preserving local operating model.
          - Oversaw design reviews and large-scale modernisation efforts including cloud infrastructure restructuring that yielded ~50% cost reduction across compute, storage, and network.
          - Coached EMs and Tech Leads on technical leadership, design judgement, and outcome ownership; restructured teams to align talent with the highest-impact opportunities.
          - Managed mixed internal and vendor engineering capacity across markets, setting consistent quality bars and delivery standards.
          - Drove deep GenAI adoption across the org (Copilot, Cursor, Claude Code, internal LLM-assisted code review and test generation), sustaining development velocity through a deliberate scale-down by offsetting reduced headcount with AI-leveraged productivity.
          - Shipped AI-powered internal products including LLM-assisted listing categorization, content moderation, fraud signal extraction, and seller tooling, replacing manual operational workflows and reducing trust & safety review load substantially.
          - Established engineering norms for GenAI use (prompt patterns, code review gating, security guardrails, eval frameworks) so AI-assisted output met production quality bars.
      - title: "Director of Engineering, Platform & Verticals"
        period: "Jan 2021 - Dec 2022"
        details:
          - Scaled engineering organization to 150+ people; directly managed 70+ engineers across Merchants, Trust & Safety, and Properties verticals through EMs and Tech Leads.
          - Set platform-wide architecture, tools, and practices that improved org-wide scalability, security, and velocity; balanced innovation with BAU tech debt reduction.
          - Built and mentored the leadership layer (EMs and senior ICs) that allowed the org to scale beyond founder-led structures, with structured career ladders and growth plans.
          - Partnered with Product and Data Science to translate user problems into measurable outcomes via experimentation frameworks and event-driven ML integration.
          - Reduced time-to-ship by ~20% through CI/CD pipeline improvements, observability investments, and engineering excellence practices across distributed Singapore and India teams.
      - title: Senior Engineering Manager
        period: "Nov 2017 - Dec 2020"
        details:
          - Joined Carousell to build the monetization function from zero, taking it through the full lifecycle from problem framing and POC experiments to scaled, reliable production services across listings, ads, subscriptions, and paid placements.
          - Led Listing Quota, one of Carousell's most significant monetization initiatives; managed 24 direct/indirect reports across local and remote teams; partnered with Product, Data, and Finance on pricing models and experimentation.
          - Established weekly app release cadence and championed CI/CD transformation contributing to 15% faster deployment cycles.


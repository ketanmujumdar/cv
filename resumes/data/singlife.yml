experience:
  - position: VP of Engineering
    company: YouTrip
    location: Singapore
    period: "Jan 2026 - Present"
    details:
      - Lead 70+ engineers across Singapore, India, Hong Kong, and Indonesia through EMs and Tech Leads on a MAS-regulated fintech platform processing $15B+ in annual transactions.
      - Own platform strategy, low-level design, and non-functional requirements (scalability, availability, security, performance, resilience) across a Java + AWS + EKS stack with Terraform IaC and React front-ends.
      - Hands-on where it matters, reviewing MRs on high-risk components and driving design reviews across squads, while setting coding standards and engineering best practices.
      - Reduced critical 5xx transaction errors by 31%+ through targeted reliability engineering, stronger SRE practices, and a weekly operational review cadence covering SLOs, incidents, and capacity.
      - Strengthened secure SDLC, vulnerability management, and observability (logging, monitoring, alerting) under MAS-aligned controls, AML/KYC guardrails, and audit expectations.
      - Manage technical debt within risk tolerance, balancing platform investment against product delivery through quarterly technical scope planning per sprint and release.
      - Partner with Product Owners, business stakeholders, and external vendors on delivery scope, dependency management, and vendor governance.
      - Drive GenAI adoption across development, testing, and code review workflows to lift engineering productivity and code quality without compromising security guardrails.

  - company: Carousell
    location: Singapore
    period: "Nov 2017 - Dec 2025 (8 years)"
    subroles:
      - title: "Head of Engineering, Laku6 & Director of Engineering"
        period: "Jan 2023 - Dec 2025"
        note: "Laku6 is Carousell's Indonesia recommerce arm (acquired 2021)."
        details:
          - Led 50+ engineers and product managers across 3 platform teams in Singapore, India, and Indonesia through EMs and Tech Leads, with quarterly OKRs driving 90%+ delivery success.
          - Established unified architectural vision and cross-squad technical standards covering security, scalability, and DevOps/SRE practices.
          - Drove platformization of payments, subscriptions, recommendations, and API layers into a reusable event-driven, API-first distributed backbone, reducing time-to-integration for new market launches.
          - Led the Laku6 integration into Carousell's core platform, a major platform migration aligning architectures, payment rails, and data systems across markets while preserving local operating model.
          - Managed mixed internal and vendor engineering capacity across markets, setting consistent quality bars, coding standards, and delivery expectations.
          - Oversaw design reviews and large-scale modernisation including cloud infrastructure restructuring that yielded ~50% cost reduction across compute, storage, and network.
          - Coached EMs and Tech Leads on technical leadership, design judgement, and outcome ownership; provided regular feedback and restructured teams to align talent with the highest-impact opportunities.
          - Drove deep GenAI adoption across the org (Copilot, Cursor, Claude Code, internal LLM-assisted code review and test generation), sustaining development velocity through a deliberate scale-down.
          - Shipped AI-powered internal products including LLM-assisted listing categorization, content moderation, fraud signal extraction, and seller tooling, replacing manual operational workflows.
          - Established engineering norms for GenAI use (prompt patterns, code review gating, security guardrails, eval frameworks) so AI-assisted output met production quality bars.
      - title: "Director of Engineering, Platform & Verticals"
        period: "Jan 2021 - Dec 2022"
        details:
          - Scaled engineering to 150+ people; directly managed 70+ engineers across Merchants, Trust & Safety, and Properties verticals through EMs and Tech Leads.
          - Set platform-wide architecture, tools, and practices that improved org-wide scalability, security, and velocity; balanced innovation with BAU tech debt reduction within risk tolerance.
          - Built and mentored the leadership layer (EMs and senior ICs) that allowed the org to scale beyond founder-led structures, with structured career ladders and growth plans.
          - Partnered with Product and Data Science to translate user problems into measurable outcomes via experimentation frameworks and event-driven ML integration.
          - Reduced time-to-ship by ~20% through CI/CD pipeline improvements, observability investments, and engineering excellence practices across distributed Singapore and India teams.
      - title: Senior Engineering Manager
        period: "Nov 2017 - Dec 2020"
        details:
          - Joined Carousell to build the monetization function from zero, taking it through the full lifecycle from problem framing and POC experiments to scaled, reliable production services across listings, ads, subscriptions, and paid placements.
          - Led Listing Quota, one of Carousell's most significant monetization initiatives; managed 24 direct/indirect reports across local and remote teams; partnered with Product, Data, and Finance on pricing models and experimentation.
          - Established weekly app release cadence and championed CI/CD transformation contributing to 15% faster deployment cycles.

  - position: Senior Manager
    company: MediaCorp
    location: Singapore
    period: "Mar 2016 - Oct 2017"
    details:
      - Led platform initiatives for meWATCH OTT streaming; owned SSO across 30 properties and CI/CD reliability for high-traffic content delivery.

  - position: Release Manager / Senior Developer
    company: Zalora
    location: Singapore
    period: "Mar 2013 - Mar 2016"
    details:
      - Introduced agile and release management practices org-wide; designed CI infrastructure for deployments, smoke tests, and nightly test loops across distributed engineering teams.

  - position: Founder / Lead Engineer
    company: Independent
    location: India
    period: "2008 - 2012"
    details:

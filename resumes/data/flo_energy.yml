# Flo Energy - Chief Technology Officer
# Overrides base.yml fields. Only include fields you want to change.

basics:
  headline: "Technology Executive | Platform Scaling & Multi-Market Expansion | Revenue Platforms & Monetization at Scale"

theme:
  primary: "#0f6b3d"
  primary_light: "#dcfce7"
  sidebar_bg: "#f0fdf4"

summary: >-
  Technology executive with 17+ years of experience building and scaling
  platform-led engineering organizations across APAC. Currently VP of
  Engineering at YouTrip, leading a distributed organization of 70+ engineers
  across Singapore, India, Hong Kong, and Indonesia on a proprietary
  multi-market fintech platform supporting millions of users and high-volume
  transaction flows.

  Spent 8 years at Carousell progressing from Senior Engineering Manager to
  Head of Engineering, scaling the org to 150+ engineers across Singapore,
  India, and Indonesia. There I helped evolve core payments, subscriptions,
  and API capabilities into reusable multi-market platforms supporting
  Southeast Asia expansion, and led the integration of Laku6 (acquired
  Indonesian recommerce platform) into the core platform, a direct parallel
  to franchise and multi-entity platform consolidation.

  My background spans product, recommerce, advertisement, and payments,
  building high-reliability platforms, complex integrations, data systems,
  and engineering operations at scale. I'm particularly passionate about
  building strong engineering cultures, developing leadership layers,
  improving accountability and execution, and helping fast-growing companies
  transition from founder-driven teams into mature organizations capable of
  operating at regional and global scale.


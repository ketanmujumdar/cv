cover_letter: |
  Dear GovTech Hiring Team,

  I'm applying for the PDO Engineering Leader (Director / Deputy Director)
  role within GDT CTOF. I'm a Singapore Permanent Resident, based in
  Singapore, and the chance to put 18 years of platform leadership behind
  Smart Nation outcomes is the kind of mission I want my next chapter to be
  about.

  The PDO mandate maps directly to how I already operate. I act as a
  manager-of-managers across multiple squads, set architectural vision and
  cross-squad standards, and balance innovation with the unglamorous BAU
  work (tech debt, reliability, security) that keeps services trustworthy.
  I've built capability across both internal staff and vendor teams,
  coached EMs and Tech Leads through the shift from delivery to leadership,
  and reshaped org structures to align talent with the highest-impact
  opportunities.

  Across 8 years at Carousell I scaled engineering to 150+ across Singapore,
  India, and Indonesia. I drove platformization of payments, subscriptions,
  recommendations, and API layers into a reusable event-driven, API-first
  distributed backbone, the kind of shared-platform thinking that promotes
  reuse and avoids the duplicated complexity GovTech is trying to reduce
  across Ministries. I led the integration of Laku6, our acquired
  Indonesian recommerce arm, into the core stack, a multi-quarter platform
  migration aligning architectures, payment rails, and data systems across
  markets while preserving the local operating model. I also led a deep
  cloud restructuring that yielded ~50% infrastructure cost reduction.
  Public-sector tech has a similar shape: many agency contexts, one
  coherent technical direction, sustained pressure to keep services
  cost-effective and adaptable.

  In my final year at Carousell I drove org-wide GenAI adoption (Copilot,
  Cursor, Claude Code, internal LLM-assisted code review and test
  generation) and shipped AI-powered internal products for listing
  categorization, content moderation, fraud signal extraction, and seller
  tooling. The concrete outcome: development velocity was sustained, and
  on several teams improved, through a deliberate scale-down by offsetting
  reduced headcount with AI-leveraged productivity. I also established the
  engineering norms (prompt patterns, code review gating, security
  guardrails, eval frameworks) needed for AI-assisted output to meet
  production quality bars. This is the "curious and evolving" practice
  GovTech describes, with real production miles on it.

  Currently, as VP of Engineering at YouTrip, I own the full engineering
  function for a regulated fintech platform processing over $15B in annual
  transactions across Singapore, Thailand, Malaysia, and Australia. I
  manage 70+ engineers through EMs and Tech Leads. The day-to-day is what
  the PDO brief calls for: technical credibility (I still read code and
  drive design reviews), secure-and-reliable by design (we've driven a
  31%+ reduction in critical 5xx errors and tightened secure SDLC), and
  partnering with Product, Security, and Compliance on multi-year
  platform direction in a regulated environment.

  I'm comfortable across the full product lifecycle, from problem framing
  and POC/POV experiments to scaled production services. I default to
  evidence-based decisions, outcome-oriented OKRs, and clear communication
  with both engineers and senior non-technical stakeholders. I'm an
  ecosystem thinker by instinct: my Carousell platform work was largely
  about balancing the needs of individual product teams with org-wide
  alignment, reuse, and capability growth, which is exactly the tension a
  PDO Engineering Leader is asked to resolve at Ministry scale.

  I'd welcome the chance to discuss how I can help GDT CTOF lift
  engineering capability and delivery outcomes across the Ministry estate.

  Ketan Mujumdar
  Singapore PR

cover_letter: |
  Dear Singlife Hiring Team,

  I'm applying for the VP, Application Development role. I'm a Singapore
  Permanent Resident based in Singapore, and I'm drawn to Singlife because
  the role sits at the intersection of hands-on engineering, low-level
  design ownership, and multi-squad leadership in a regulated financial
  services environment, which is the shape of work I already do.

  I should be upfront about one thing: my direct domain experience is
  in MAS-regulated payments and fintech, not life insurance. What I
  bring in its place is the same regulatory posture, AML/KYC guardrails,
  audit trails, MAS-aligned controls, secure SDLC, and vendor governance,
  applied at production scale on a platform processing over $15B in
  annual transactions. Insurance back-office, CRM, content, and workflow
  domains are learnable; the discipline of running a regulated FI
  platform is not, and that is what I have been doing.

  As VP of Engineering at YouTrip, I lead 70+ engineers across Singapore,
  India, Hong Kong, and Indonesia through EMs and Tech Leads. The stack
  is a direct match for what Singlife is asking for: Java services,
  API-first architecture, AWS with Terraform IaC, containers on EKS,
  React front-ends, and a React Native mobile app. My day-to-day covers
  the full brief in the JD: I own low-level design and non-functional
  requirements (scalability, availability, security, performance,
  resilience), review MRs on high-risk components, set coding standards
  and best practices, mentor senior and junior engineers, provide
  regular feedback, and manage technical debt within an explicit risk
  tolerance while working with Product Owners, business users, and
  external vendors on scope and dependencies. On the operations side, I
  drive incident management, root cause analysis, vulnerability and
  cyber fixes, and the logging, monitoring, and alerting standards that
  every deliverable needs to meet.

  Across 8 years at Carousell I scaled engineering to 150+ across
  Singapore, India, and Indonesia, and drove platformization of
  payments, subscriptions, and API layers into a reusable event-driven,
  API-first backbone. I led the Laku6 integration, a multi-quarter
  platform migration aligning architectures, payment rails, and data
  systems across markets, and managed mixed internal and vendor
  engineering capacity with consistent quality bars. I coached EMs and
  Tech Leads on technical leadership and design judgement, and reshaped
  teams to align talent with the highest-impact opportunities.

  In my final year at Carousell I drove org-wide GenAI adoption
  (Copilot, Cursor, Claude Code, internal LLM-assisted code review and
  test generation) and shipped AI-powered internal products for
  categorization, content moderation, fraud signal extraction, and
  seller tooling. Development velocity was sustained and in several
  teams improved through a deliberate scale-down by offsetting reduced
  headcount with AI-leveraged productivity. I also established the
  engineering norms (prompt patterns, code review gating, security
  guardrails, eval frameworks) that let AI-assisted output meet
  production quality bars, which is the practical GenAI experience the
  JD is asking about.

  I'd welcome the chance to discuss how I can help Singlife raise the
  bar on Application Development, particularly on the engineering
  discipline, secure delivery, and platform quality side, and how my
  fintech background maps onto the insurance domain in practice.

  Ketan Mujumdar
  Singapore PR

    details:
      - Owned platform strategy, architecture, and engineering execution across four markets, partnering directly with the CEO and exec team on multi-year direction.
      - Led 70+ engineers across Singapore, India, Hong Kong, and Indonesia through EMs and Tech Leads on a regulated fintech platform processing $15B+ in annual transactions.
      - Set architectural standards and design-review practices across squads, balancing innovation with operational excellence and tech-debt management.
      - Carried the Weekly Operational Review (WOR) practice across from Carousell, a recurring forum on SLO posture, error-budget burn, latency regressions, incident post-mortem actions, and capacity headroom, turning reliability into a measurable exec-visible scorecard.
      - Reduced critical 5xx transaction errors by 31%+ through targeted reliability engineering, stronger SRE practices, and the WOR cadence above.
      - Drove GenAI adoption across development, testing, and code review workflows to lift engineering productivity and code quality without compromising security guardrails.
      - Strengthened secure SDLC, observability, and operational governance across a regulated, high-throughput payments environment.

  - company: Carousell
    location: Singapore
    period: "Nov 2017 - Dec 2025 (8 years)"
    subroles:
      - title: "Head of Engineering, Laku6 & Director of Engineering"
        period: "Jan 2023 - Dec 2025"
        note: "Laku6 is Carousell's Indonesia recommerce arm (acquired 2021)."
        details:
          - Led 50+ engineers and product managers across 3 platform teams in Singapore, India, and Indonesia, managing through EMs and Tech Leads, with quarterly OKRs driving 90%+ delivery success.
          - Drove platformization of payments, subscriptions, recommendations, and external partner APIs into a reusable event-driven, API-first distributed backbone, reducing time-to-integration for new market and partner launches, a direct parallel to TabSquare's "product to platform" evolution.
          - Led the post-acquisition integration of Laku6 (Indonesian recommerce) into Carousell's core platform, aligning architectures, payment rails, and data systems across markets while preserving local operating model, the same shape of architectural consolidation TabSquare's APAC expansion needs.
          - Owned integrations with external payment rails, financial invoicing systems, and market-specific APIs across Indonesia and Singapore, managing complex data reconciliation and high-volume B2B/B2B2C transaction flows.
          - Instituted ML-powered monetization, recommendation, and ranking systems, directly impacting revenue and user engagement across multiple markets.
          - Drove deep GenAI adoption across the engineering org (Copilot, Cursor, Claude Code, internal LLM-assisted code review and test generation tooling), sustaining and lifting development velocity through a deliberate team scale-down by offsetting reduced headcount with AI-leveraged productivity, an AI-native operating model in practice.

cover_letter: |
  Dear Visa Hiring Team,

  I'm applying for the Director, Software Engineering role within Visa's Value
  Added Services - Digital Marketing & Engagement organization. The mandate,
  providing technical leadership for the Loyalty, Customer Engagement, and
  Marketing platform at global scale, maps directly to the work I've delivered
  across the past decade.

  I spent 8 years at Carousell, Southeast Asia's largest classifieds
  marketplace, scaling engineering from a small team to 150+ across Singapore,
  India, and Indonesia. There I built the monetization and engagement platform
  from a $0 function into a multi-market revenue engine spanning ads,
  subscriptions, paid placements, recommendations, and seller-facing engagement
  products, growing daily revenue 30x. The product parallel to Visa's Loyalty
  and Engagement platform is direct: high-throughput transaction-adjacent
  systems, recommendation and ranking engines, experimentation frameworks, and
  monetization infrastructure operating across multiple markets.

  I also drove the platformization of payments, subscriptions, and API layers
  into a reusable event-driven, API-first distributed backbone, and led the
  integration of Laku6, Carousell's acquired Indonesian recommerce platform,
  into the core stack. That work aligned architectures, payment rails, and
  data systems across markets, the same kind of cross-team, cross-architecture
  consolidation Visa's global Loyalty platform demands.

  GenAI in engineering is one of the areas I've invested in most deeply over
  the past two years. In my last year at Carousell, I drove org-wide adoption
  of AI-assisted development (Copilot, Cursor, Claude Code, internal
  LLM-assisted code review and test generation), and shipped AI-powered
  internal products for listing categorization, content moderation, fraud
  signal extraction, and seller tooling. The most concrete outcome: we held
  development velocity steady, and improved it on several teams, through a
  deliberate team scale-down by offsetting reduced headcount with
  AI-leveraged productivity. I also established the engineering norms
  (prompt patterns, code review gating, security guardrails, eval
  frameworks) needed for AI-assisted output to meet production quality bars
  on a high-throughput transaction platform.

  Currently, as VP of Engineering at YouTrip, I lead the full engineering
  function for a proprietary fintech platform processing over $15 billion in
  annual transactions across Singapore, Thailand, Malaysia, and Australia. I
  manage 70+ engineers through engineering managers and tech leads. The
  operating mode is exactly what the Visa brief calls for: hands-on technical
  leadership across distributed systems, real-time transaction reliability
  (I've driven a 31%+ reduction in critical 5xx errors), continued GenAI
  adoption across the engineering org, and partnering with Product, Security,
  and Platform Infrastructure on long-term platform strategy.

  On the organizational side, I've built engineering career ladders from
  scratch, coached engineering managers through the shift from IC to people
  leader, and established operational rhythms (incident management,
  post-mortems, on-call, observability, KPI dashboards) that create
  accountability without bureaucracy. I lead with a client-first mindset and
  invest deeply in growing high-performing, diverse, globally-distributed
  teams.

  My core stack experience spans Python, Ruby on Rails, PHP, TypeScript,
  React, Vue, AWS, GCP, and Kubernetes, with working exposure to Java/Spring
  ecosystems through integration work. I'm comfortable going deep on
  distributed systems patterns (microservices, event-driven, API-first,
  fault-tolerant design) regardless of language.

  I'd welcome the opportunity to discuss how my experience can help Visa's
  Digital Marketing & Engagement organization accelerate its next phase.

  Ketan Mujumdar

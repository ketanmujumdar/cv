summary: >-
  Hands-on engineering leader with 17+ years across APAC building and scaling
  distributed platforms in regulated environments, with a current focus on
  embedding AI deeply into both the engineering function and the products
  themselves.

  Currently VP of Engineering at YouTrip, a regulated fintech platform
  processing over $15B in annual transactions across Singapore, Thailand,
  Malaysia, and Australia, leading 70+ engineers across four countries.
  Operate as the architectural anchor: still in code and design reviews
  daily, owning system design, data architecture, secure SDLC, and cloud
  infrastructure across markets. Drove a 31%+ reduction in critical 5xx
  transaction errors through targeted reliability engineering on a
  high-throughput card and FX platform.

  Spent the prior 8 years at Carousell, scaling engineering from a small
  team to 150+ across Singapore, India, and Indonesia. Built the
  monetization and engagement platform from a $0 function into a multi-market
  revenue engine, drove platformization of payments, subscriptions, and APIs
  into an event-driven distributed backbone, and led the integration of the
  acquired Laku6 Indonesian recommerce platform into the core stack.

  AI-native operator. In the past two years drove org-wide GenAI adoption
  (Copilot, Cursor, Claude Code, internal LLM-assisted code review, test
  generation, design review, and on-call assistants), sustaining and lifting
  development velocity through a deliberate team scale-down. Shipped
  AI-powered internal products replacing manual operational workflows
  (categorization, content moderation, fraud signal extraction, seller
  tooling). Established the engineering norms (prompt patterns, eval
  frameworks, code review gating, security guardrails, data-handling
  policies) required for AI output to meet production quality bars on
  high-throughput transaction systems in a regulated environment.

  Background spans high-throughput transaction processing, cloud
  infrastructure and DevOps at scale (~50% infra cost reduction at
  Carousell), secure SDLC and DevSecOps, multi-market APAC operations,
  and engineering org design from zero-to-150+.

